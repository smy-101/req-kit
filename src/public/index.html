<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>req-kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>req-kit</h2>
        <div class="sidebar-actions">
          <button id="btn-import" title="Import">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button id="btn-new-collection" title="New Collection">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div id="env-selector">
        <select id="active-env">
          <option value="">No Environment</option>
        </select>
        <button id="btn-manage-env" title="Manage Environments">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
      <div id="collection-tree"></div>
    </aside>

    <!-- Main content -->
    <main id="main-content">
      <!-- Tab Bar -->
      <div id="tab-bar"></div>

      <!-- URL Bar -->
      <div id="url-bar">
        <select id="method-select">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="PATCH">PATCH</option>
          <option value="DELETE">DELETE</option>
          <option value="HEAD">HEAD</option>
          <option value="OPTIONS">OPTIONS</option>
        </select>
        <input type="text" id="url-input" placeholder="Enter request URL or paste curl...">
        <button id="send-btn">Send</button>
        <button id="save-btn" title="Save Request">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
      </div>

      <!-- Request/Response panels -->
      <div id="request-response">
        <!-- Request tabs -->
        <div id="request-panel" style="flex: 0 0 45%;">
          <div class="tab-bar">
            <button class="tab active" data-tab="headers">Headers</button>
            <button class="tab" data-tab="params">Params</button>
            <button class="tab" data-tab="body">Body</button>
            <button class="tab" data-tab="auth">Auth</button>
            <button class="tab" data-tab="script">Pre-request Script</button>
          </div>
          <div class="tab-content" id="tab-headers"></div>
          <div class="tab-content hidden" id="tab-params"></div>
          <div class="tab-content hidden" id="tab-body"></div>
          <div class="tab-content hidden" id="tab-auth"></div>
          <div class="tab-content hidden" id="tab-script"></div>
        </div>

        <!-- Panel resizer -->
        <div class="panel-resizer" id="panel-resizer"></div>

        <!-- Response panel -->
        <div id="response-panel">
          <div class="response-header">
            <span id="response-status"></span>
            <span id="response-time"></span>
            <span id="response-size"></span>
          </div>
          <div class="tab-bar">
            <button class="tab active" data-response-tab="body">Body</button>
            <button class="tab" data-response-tab="headers">Headers</button>
          </div>
          <div class="tab-content" id="response-body">
            <div class="empty-state">
              <div class="empty-state-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
              </div>
              <div class="empty-state-title">Send a Request</div>
              <div class="empty-state-desc">Enter a URL and press Send, or use <span class="kbd">Ctrl</span> + <span class="kbd">Enter</span></div>
            </div>
          </div>
          <div class="tab-content hidden" id="response-headers"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modals -->
  <div id="modal-overlay" class="hidden">
    <div id="modal"></div>
  </div>

  <!-- Scripts -->
  <script src="/js/utils/json-format.js"></script>
  <script src="/js/utils/curl-parser.js"></script>
  <script src="/js/utils/template.js"></script>
  <script src="/js/utils/toast.js"></script>
  <script src="/js/utils/dialogs.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/components/tab-bar.js"></script>
  <script src="/js/components/url-bar.js"></script>
  <script src="/js/components/tab-panel.js"></script>
  <script src="/js/components/headers-editor.js"></script>
  <script src="/js/components/body-editor.js"></script>
  <script src="/js/components/response-viewer.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/env-manager.js"></script>
  <script src="/js/components/auth-panel.js"></script>
  <script src="/js/components/import-export.js"></script>
  <script src="/js/components/script-editor.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/utils/panel-resizer.js"></script>
</body>
</html>
